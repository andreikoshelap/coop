spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/funds}
    username: ${DB_USERNAME:funds}
    password: ${DB_PASSWORD:funds}
  jpa:
    hibernate:
      ddl-auto: validate      # schema is owned by Flyway, never by Hibernate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false        # no lazy loading outside a transaction
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug   # see the SELECT ... FOR UPDATE actually happen
