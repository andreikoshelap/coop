<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="800" viewBox="0 0 1240 800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1240" height="800" fill="#ffffff"/>

  <rect x="20" y="24" width="150" height="48" rx="6" fill="#f5f5f5" stroke="#999999"/>
  <text x="95" y="45" font-size="12" text-anchor="middle" fill="#2c2c2a">Channels</text>
  <text x="95" y="61" font-size="10" text-anchor="middle" fill="#5f5e5a">app / internet bank</text>
  <rect x="225" y="24" width="150" height="48" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="300" y="45" font-size="12" text-anchor="middle" fill="#0c447c">Order service</text>
  <text x="300" y="61" font-size="10" text-anchor="middle" fill="#185fa5">saga orchestrator</text>
  <rect x="425" y="24" width="150" height="48" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="500" y="45" font-size="12" text-anchor="middle" fill="#0c447c">Contract service</text>
  <text x="500" y="61" font-size="10" text-anchor="middle" fill="#185fa5">agreement, MiFID</text>
  <rect x="625" y="24" width="150" height="48" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="700" y="45" font-size="12" text-anchor="middle" fill="#633806">Bank core</text>
  <text x="700" y="61" font-size="10" text-anchor="middle" fill="#854f0b">Funds API + holds</text>
  <rect x="825" y="24" width="150" height="48" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="900" y="45" font-size="12" text-anchor="middle" fill="#3c3489">Broker gateway</text>
  <text x="900" y="61" font-size="10" text-anchor="middle" fill="#534ab7">ACL → external broker</text>
  <rect x="1025" y="24" width="150" height="48" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="1100" y="53" font-size="12" text-anchor="middle" fill="#173404">Portfolio service</text>

  <line x1="95" y1="72" x2="95" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>
  <line x1="300" y1="72" x2="300" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>
  <line x1="500" y1="72" x2="500" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>
  <line x1="700" y1="72" x2="700" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>
  <line x1="900" y1="72" x2="900" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>
  <line x1="1100" y1="72" x2="1100" y2="740" stroke="#b3b3b3" stroke-dasharray="5 4"/>

  <text x="197" y="106" font-size="10" text-anchor="middle" fill="#444441">1. buy(orderId, isin, qty) — idempotency key</text>
  <line x1="95" y1="116" x2="296" y2="116" stroke="#666666" marker-end="url(#arrow)"/>

  <rect x="310" y="128" width="180" height="34" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="318" y="143" font-size="10" fill="#633806">TX1 (local ACID):</text>
  <text x="318" y="156" font-size="10" fill="#854f0b">order = PENDING + outbox</text>

  <text x="400" y="184" font-size="10" text-anchor="middle" fill="#185fa5">2. checkContract(customerId)</text>
  <line x1="300" y1="194" x2="496" y2="194" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="234" font-size="10" text-anchor="middle" fill="#185fa5">3. active agreement + risk profile OK</text>
  <line x1="500" y1="244" x2="304" y2="244" stroke="#6c8ebf" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <rect x="512" y="184" width="180" height="64" rx="4" fill="#f8cecc" stroke="#b85450"/>
  <text x="520" y="200" font-size="10" fill="#501313">No agreement / unsuitable ⇒</text>
  <text x="520" y="214" font-size="10" fill="#a32d2d">reject before any money is</text>
  <text x="520" y="228" font-size="10" fill="#a32d2d">touched. Cheapest failure —</text>
  <text x="520" y="242" font-size="10" fill="#a32d2d">nothing to compensate.</text>

  <text x="500" y="286" font-size="10" text-anchor="middle" fill="#854f0b">4. hold(orderId, amount, ttl)</text>
  <line x1="300" y1="296" x2="696" y2="296" stroke="#d79b00" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="712" y="284" width="180" height="50" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="720" y="300" font-size="10" fill="#633806">TX2 (ACID in core):</text>
  <text x="720" y="314" font-size="10" fill="#854f0b">SELECT FOR UPDATE,</text>
  <text x="720" y="328" font-size="10" fill="#854f0b">available = balance − Σ holds</text>

  <text x="500" y="356" font-size="10" text-anchor="middle" fill="#854f0b">5. reservationId</text>
  <line x1="700" y1="366" x2="304" y2="366" stroke="#d79b00" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <text x="600" y="406" font-size="10" text-anchor="middle" fill="#534ab7">6. placeOrder(orderId) — idempotent, client order id</text>
  <line x1="300" y1="416" x2="896" y2="416" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="600" y="456" font-size="10" text-anchor="middle" fill="#534ab7">7. accepted</text>
  <line x1="900" y1="466" x2="304" y2="466" stroke="#9673a6" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <rect x="912" y="438" width="180" height="64" rx="4" fill="#f8cecc" stroke="#b85450"/>
  <text x="920" y="454" font-size="10" fill="#501313">Timeout ⇒ status UNKNOWN.</text>
  <text x="920" y="468" font-size="10" fill="#a32d2d">Never release the hold</text>
  <text x="920" y="482" font-size="10" fill="#a32d2d">blindly — poll the broker,</text>
  <text x="920" y="496" font-size="10" fill="#a32d2d">then reconcile.</text>

  <text x="600" y="526" font-size="10" text-anchor="middle" fill="#3b6d11">8. executed(fill) — async callback, at-least-once</text>
  <line x1="900" y1="536" x2="304" y2="536" stroke="#82b366" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="500" y="576" font-size="10" text-anchor="middle" fill="#854f0b">9. settle(reservationId, actualAmount)</text>
  <line x1="300" y1="586" x2="696" y2="586" stroke="#d79b00" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="712" y="574" width="180" height="50" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="720" y="590" font-size="10" fill="#633806">TX3 (ACID in core):</text>
  <text x="720" y="604" font-size="10" fill="#854f0b">debit + close hold in one TX.</text>
  <text x="720" y="618" font-size="10" fill="#854f0b">Excess released.</text>

  <text x="700" y="646" font-size="10" text-anchor="middle" fill="#3b6d11">10. OrderExecuted event (outbox → Kafka)</text>
  <line x1="300" y1="656" x2="1096" y2="656" stroke="#82b366" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="600" y="686" font-size="10" text-anchor="middle" fill="#3b6d11">11. position updated (push) — eventual consistency</text>
  <line x1="1100" y1="696" x2="99" y2="696" stroke="#82b366" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <text x="500" y="726" font-size="10" text-anchor="middle" fill="#a32d2d">12. release(reservationId) — compensation: reject / TTL expiry / broker rejection</text>
  <line x1="300" y1="736" x2="696" y2="736" stroke="#b85450" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <text x="20" y="766" font-size="10" fill="#5f5e5a">Blue — internal synchronous call.   Orange — synchronous, ACID inside the bank core.   Purple — external broker call, no transaction.   Green — asynchronous event, at-least-once + idempotent consumer.   Red — compensation / failure path.</text>
  <text x="20" y="782" font-size="10" font-weight="600" fill="#444441">No 2PC anywhere: saga with compensation, plus nightly reconciliation against the broker as the safety net. Contract is checked first — the cheapest place to fail.</text>
</svg>
