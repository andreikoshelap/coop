  <text x="372" y="283" font-size="10" text-anchor="middle" fill="#185fa5">positions, P&amp;L, position holds</text>
  <rect x="492" y="244" width="200" height="56" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="592" y="266" font-size="12" text-anchor="middle" fill="#0c447c">Instrument &amp; search</text>
