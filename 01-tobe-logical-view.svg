  <rect x="52" y="330" width="200" height="56" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="152" y="352" font-size="12" text-anchor="middle" fill="#0c447c">Market data</text>
  <text x="152" y="369" font-size="10" text-anchor="middle" fill="#185fa5">near real-time prices, fan-out</text>
  <rect x="272" y="330" width="200" height="56" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="372" y="352" font-size="12" text-anchor="middle" fill="#0c447c">Contract service</text>
  <text x="372" y="369" font-size="10" text-anchor="middle" fill="#185fa5">agreement, MiFID profile</text>
  <rect x="492" y="330" width="200" height="56" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="592" y="352" font-size="12" text-anchor="middle" fill="#0c447c">Regulatory reporting</text>
  <text x="592" y="369" font-size="10" text-anchor="middle" fill="#185fa5">nightly report to FI</text>

  <rect x="30" y="446" width="1040" height="40" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
