  <text x="510" y="155" font-size="12" text-anchor="middle" fill="#173404">API gateway / BFF</text>
  <text x="510" y="171" font-size="10" text-anchor="middle" fill="#3b6d11">REST + WebSocket</text>

  <rect x="30" y="205" width="700" height="215" rx="16" fill="#e8f5f0" stroke="#1d9e75" stroke-dasharray="5 4"/>
