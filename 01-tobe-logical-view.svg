  <text x="865" y="244" font-size="10" text-anchor="middle" fill="#a32d2d">analytics / BI only</text>
  <rect x="790" y="272" width="150" height="50" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="865" y="295" font-size="12" text-anchor="middle" fill="#501313">CRM</text>
  <text x="865" y="311" font-size="10" text-anchor="middle" fill="#a32d2d">read model of positions</text>
  <rect x="790" y="339" width="150" height="50" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="865" y="362" font-size="12" text-anchor="middle" fill="#501313">AML monitoring</text>
  <text x="865" y="378" font-size="10" text-anchor="middle" fill="#a32d2d">must cover investments</text>
  <rect x="960" y="272" width="110" height="50" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="1015" y="295" font-size="12" text-anchor="middle" fill="#501313">Notifications</text>
  <text x="1015" y="311" font-size="10" text-anchor="middle" fill="#a32d2d">e-mail / SMS</text>

  <line x1="865" y1="442" x2="865" y2="395" stroke="#9673a6" marker-end="url(#arrow)"/>
  <line x1="1015" y1="442" x2="1015" y2="328" stroke="#9673a6" marker-end="url(#arrow)"/>

  <rect x="30" y="596" width="1040" height="0" fill="none"/>
  <text x="30" y="610" font-size="10" fill="#5f5e5a">Orange = synchronous, ACID inside the core.  Purple = asynchronous events / external integration.  Red = existing systems, consume events only.</text>
