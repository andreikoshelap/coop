  <text x="825" y="564" font-size="10" text-anchor="middle" fill="#5f5e5a">REST / FIX</text>
  <line x1="720" y1="550" x2="746" y2="550" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow)"/>

