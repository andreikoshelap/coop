  <text x="620" y="560" font-size="10" text-anchor="middle" fill="#534ab7">idempotent, anti-corruption</text>
  <line x1="592" y1="420" x2="592" y2="442" stroke="#9673a6" marker-end="url(#arrow)"/>

  <rect x="750" y="520" width="150" height="60" rx="6" fill="#f5f5f5" stroke="#999999"/>
